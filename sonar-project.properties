# SonarQube analysis config.
#
# No secrets or environment-specific values are stored here:
#   - the server URL and analysis token come from the local credential store
#     (KWallet) at scan time, supplied via SONAR_HOST_URL / SONAR_TOKEN.
#   - run with: scripts/sonar.sh   (reads both from KWallet)

# Unique key so this project does not overwrite any other on the server.
sonar.projectKey=hd2-sc-arrow
sonar.projectName=Super Credit Arrows (HD2 mod)
sonar.projectVersion=2.0.0

# The mod ships binary game-asset patches (blue/, purple/) that are not source
# code. The analysable code is the local pipeline tooling under scripts/.
sonar.sources=scripts

sonar.exclusions=**/node_modules/**,**/build/**,**/target/**,**/dist/**,**/docs/**,blue/**,purple/**,**/*.patch_*,**/*.gpu_resources,**/*.stream,**/*.png

# No unit tests: the tooling is shell/Node glue and the product is binary game
# assets, so coverage is not applicable. Excluded so the gate is not falsely red
# on untestable tooling; quality/security rules still apply to these files.
sonar.coverage.exclusions=scripts/**

sonar.sourceEncoding=UTF-8
